# === タスク一覧 ===
tasks:
  # --- Phase 1: ターミナルでの Claude Code 動作（最優先）---

  - task_id: TASK-001
    title: Dockerfile 作成（Ubuntu 24.04 + Claude Code + Codex）
    priority: 95
    status: pending
    design_id: DES-001
    depends_on: []
    group_id: null
    build_check: per_task
    description:
      - Ubuntu 24.04 をベースイメージとする
      - 必要パッケージ（curl, git, ripgrep, bash, ca-certificates）をインストール
      - 非 root ユーザー devuser を作成し /workspace の所有権を付与
      - Claude Code を公式インストーラー（curl|bash）でインストール（DES-001 §3.2）
      - OpenAI Codex を GitHub Releases から glibc バイナリとしてインストール（DES-001 §3.2）
      - ENV PATH で ~/.local/bin を PATH に追加
      - SHELL 命令で bash -o pipefail を設定（DES-001 §3.2 ビルドエラーハンドリング）
    acceptance_criteria: "docker build が成功し、コンテナ内で claude --help && codex --help が終了コード 0 で完了すること"
    required_reading:
      - specs/design/DES-001_ai_sandbox_design.md

  - task_id: TASK-002
    title: setup-sandbox.sh 作成（ターミナル起動）
    priority: 90
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: null
    build_check: per_task
    description:
      - "#!/bin/bash でスクリプトを作成（DES-001 §3.3）"
      - ターゲットプロジェクトのパスを引数で受け取る
      - 引数バリデーション（パス存在確認、git リポジトリ確認）
      - Docker インストール・起動確認
      - Dockerfile パス解決（SCRIPT_DIR 基準、DES-001 §3.3）
      - イメージ未存在時は自動ビルド
      - docker run でターゲットを /workspace にマウント、Named Volume で ~/.claude/ を永続化
      - 環境変数転送（OPENAI_API_KEY、ANTHROPIC_API_KEY）
      - --rebuild オプション対応
      - --help オプション対応
      - エラーハンドリング（DES-001 §3.3 エラーハンドリング表に従う）
    acceptance_criteria: "./setup-sandbox.sh <テストプロジェクト> でコンテナが起動し、claude --help が成功すること。exit でコンテナが削除され、Named Volume が保持されること"
    required_reading:
      - specs/design/DES-001_ai_sandbox_design.md
      - specs/requirements/FNC-002_container_launch_spec.md

  - task_id: TASK-003
    title: "Phase 1 検証: ターミナルで Claude Code 動作確認"
    priority: 85
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-001
      - TASK-002
    group_id: null
    build_check: per_task
    description:
      - docker build で Dockerfile をビルドし成功を確認
      - setup-sandbox.sh でテスト用 git プロジェクトを指定してコンテナを起動
      - コンテナ内で claude --help が終了コード 0 で完了することを確認
      - コンテナ内で codex --help が終了コード 0 で完了することを確認
      - exit でコンテナが削除されること（docker ps で確認）
      - Named Volume が保持されていること（docker volume ls で確認）
      - セキュリティ確認（ls /home/ にホストユーザーが存在しないこと）
      - エラーケーステスト（存在しないパス、git でないパス）
    acceptance_criteria: "APP-001 の成功基準「ターミナルで Claude Code が動作」を全て充足すること"
    required_reading:
      - specs/requirements/APP-001_app_overview_spec.md
      - specs/design/DES-001_ai_sandbox_design.md

  # --- Phase 2: VS Code DevContainer 動作 ---

  - task_id: TASK-004
    title: "devcontainer.json 作成 + setup-sandbox.sh --vscode 対応"
    priority: 70
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-003
    group_id: null
    build_check: per_task
    description:
      - devcontainer.json を DES-001 §3.4 に従って作成
      - setup-sandbox.sh に --vscode オプションを追加（DES-001 §3.3 方式 B）
      - --vscode 時にターゲットに .devcontainer/ をコピーする処理を実装
      - 既存 .devcontainer/ がある場合の上書き確認
    acceptance_criteria: "setup-sandbox.sh --vscode <パス> で .devcontainer/ がコピーされ、VS Code の Reopen in Container で接続できること"
    required_reading:
      - specs/design/DES-001_ai_sandbox_design.md
      - specs/requirements/FNC-001_devcontainer_environment_spec.md

  # --- 補助タスク ---

  - task_id: TASK-005
    title: Makefile の Colima メモリ設定修正
    priority: 50
    status: pending
    design_id: DES-001
    depends_on: []
    group_id: null
    build_check: skip
    description:
      - Makefile の colima start を colima start --memory 4 に変更（DES-001 §3.5）
      - MAKEFILE_GUIDE.md に Colima メモリ要件の説明を追記
    acceptance_criteria: "make install で Colima が 4GiB メモリで起動すること"
    required_reading:
      - specs/design/DES-001_ai_sandbox_design.md
      - specs/requirements/FNC-004_macos_docker_setup_spec.md

  - task_id: TASK-006
    title: CLAUDE.md・README.md の作成
    priority: 30
    status: pending
    design_id: DES-001
    depends_on:
      - TASK-003
      - TASK-004
    group_id: null
    build_check: skip
    description:
      - CLAUDE.md を新規作成（Ubuntu ベース・setup-sandbox.sh 方式の AI Sandbox プロジェクト情報）
      - README.md を新規作成（初心者向けの使い方ガイド、セットアップ手順、トラブルシューティング）
    acceptance_criteria: "CLAUDE.md と README.md が存在し、旧方式（Alpine、npm、install-devcontainer.sh）への言及がないこと"
    required_reading:
      - specs/design/DES-001_ai_sandbox_design.md
      - specs/requirements/APP-001_app_overview_spec.md

